<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЧитайКо — Хмарний Трекер</title>
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1e293b;
            margin: 0;
            padding: 0;
        }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .book-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
        }
        .book-card:hover { transform: translateY(-3px); }
        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: #4f46e5;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-secondary { background: #e5e7eb; color: #374151; }
        .btn-secondary:hover { background: #d1d5db; }
        .btn-danger { background: #fee2e2; color: #dc2626; }
        .btn-danger:hover { background: #fecaca; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .tab {
            padding: 10px 20px;
            background: #f3f4f6;
            border: none;
            border-radius: 8px;
            margin-right: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab.active { background: #4f46e5; color: white; }
        .search-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .search-input:focus { outline: none; border-color: #4f46e5; }
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }
        body.dark { background: #1f2937; color: #f9fafb; }
        body.dark .book-card { background: #374151; }
        body.dark .modal-content { background: #374151; }
    </style>
</head>

<body>
    <!-- Екран завантаження -->
    <div id="loadingScreen" class="modal">
        <div class="modal-content text-center">
            <div style="font-size: 4rem; margin-bottom: 20px;">📚</div>
            <h2 style="margin: 0; color: #4f46e5;">ЧитайКо</h2>
            <div style="width: 200px; height: 4px; background: #e5e7eb; border-radius: 2px; margin: 20px auto; overflow: hidden;">
                <div style="width: 60%; height: 100%; background: #4f46e5; border-radius: 2px; animation: loading 1.5s infinite;"></div>
            </div>
        </div>
    </div>

    <!-- Екран автентифікації -->
    <div id="authScreen" class="modal hidden">
        <div class="modal-content">
            <div style="text-align: center; margin-bottom: 30px;">
                <div style="font-size: 3rem; margin-bottom: 10px;">📚</div>
                <h1 style="margin: 0; color: #4f46e5;">ЧитайКо</h1>
                <p style="color: #64748b; margin-top: 5px;">Ваша хмарна бібліотека</p>
            </div>
            
            <div id="authError" class="hidden" style="background: #fee2e2; color: #dc2626; padding: 15px; border-radius: 8px; margin-bottom: 20px;"></div>
            
            <div>
                <input type="email" id="authEmail" placeholder="Email" class="search-input" style="margin-bottom: 15px;">
                <input type="password" id="authPassword" placeholder="Пароль (мін. 6 символів)" class="search-input" style="margin-bottom: 20px;">
                
                <div style="display: flex; gap: 15px;">
                    <button class="btn btn-primary" style="flex: 1;" onclick="handleAuth('login')">Увійти</button>
                    <button class="btn btn-secondary" style="flex: 1;" onclick="handleAuth('signup')">Створити</button>
                </div>
                
                <div style="text-align: center; margin: 20px 0; color: #64748b;">або</div>
                
                <button class="btn btn-secondary" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;" onclick="signInWithGoogle()">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Увійти через Google
                </button>
            </div>
        </div>
    </div>

    <!-- Головний застосунок -->
    <div id="appScreen" class="hidden">
        <div style="max-width: 1200px; margin: 0 auto; padding: 20px;">
            <!-- Заголовок -->
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <div>
                    <h1 style="margin: 0; font-size: 2rem; color: #4f46e5;">📚 Бібліотека</h1>
                    <p id="userEmail" style="margin: 5px 0 0 0; color: #64748b; font-size: 0.9rem;"></p>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="openSearchModal()">🔍 Пошук</button>
                    <button class="btn btn-secondary" onclick="openStatsModal()">📊 Статистика</button>
                    <button class="btn btn-secondary" onclick="toggleTheme()">🌙 Тема</button>
                    <button class="btn btn-danger" onclick="logout()">🚪 Вийти</button>
                </div>
            </header>

            <!-- Вкладки -->
            <div style="margin-bottom: 20px;">
                <button class="tab active" onclick="switchTab('reading')">📖 Читаю зараз</button>
                <button class="tab" onclick="switchTab('planned')">🕒 Хочу прочитати</button>
                <button class="tab" onclick="switchTab('finished')">✅ Прочитано</button>
            </div>

            <!-- Пошук -->
            <div id="searchSection" class="hidden" style="margin-bottom: 20px;">
                <input type="text" id="searchInput" placeholder="Пошук книг..." class="search-input" oninput="handleSearch(event)">
                <div id="searchResults" style="margin-top: 15px;"></div>
            </div>

            <!-- Список книг -->
            <div id="booksList"></div>
        </div>
    </div>

    <!-- Модальне вікно деталей книги -->
    <div id="bookDetailsModal" class="modal hidden">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="bookTitle" style="margin: 0;"></h2>
                <button class="btn btn-secondary" onclick="closeBookDetails()">✕</button>
            </div>
            
            <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                <img id="bookCover" style="width: 120px; height: 180px; object-fit: cover; border-radius: 10px;">
                <div style="flex: 1;">
                    <p id="bookAuthor" style="margin: 5px 0; color: #64748b;"></p>
                    <p id="bookPages" style="margin: 5px 0; color: #64748b;"></p>
                    <p id="bookDescription" style="margin: 10px 0; line-height: 1.6;"></p>
                </div>
            </div>

            <div id="bookActions" style="margin-bottom: 20px;">
                <select id="bookStatus" onchange="updateBookStatus()" style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px;">
                    <option value="planned">🕒 Хочу прочитати</option>
                    <option value="reading">📖 Читаю зараз</option>
                    <option value="finished">✅ Прочитано</option>
                </select>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 10px; font-weight: 600;">Оцінка:</label>
                <div id="ratingStars" style="display: flex; gap: 5px;">
                    <span style="font-size: 2rem; cursor: pointer;" onclick="setRating(1)">⭐</span>
                    <span style="font-size: 2rem; cursor: pointer;" onclick="setRating(2)">⭐</span>
                    <span style="font-size: 2rem; cursor: pointer;" onclick="setRating(3)">⭐</span>
                    <span style="font-size: 2rem; cursor: pointer;" onclick="setRating(4)">⭐</span>
                    <span style="font-size: 2rem; cursor: pointer;" onclick="setRating(5)">⭐</span>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 10px; font-weight: 600;">Нотатки:</label>
                <textarea id="bookNotes" style="width: 100%; height: 100px; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px; resize: vertical;"></textarea>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="saveBookDetails()">💾 Зберегти</button>
                <button class="btn btn-danger" onclick="deleteBook()">🗑️ Видалити</button>
            </div>
        </div>
    </div>

    <!-- Модальне вікно статистики -->
    <div id="statsModal" class="modal hidden">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">📊 Моя статистика</h2>
                <button class="btn btn-secondary" onclick="closeStatsModal()">✕</button>
            </div>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px;">
                <div class="stats-card">
                    <h3 style="margin: 0 0 10px 0;">📚 Всього книг</h3>
                    <p id="totalBooks" style="font-size: 2rem; margin: 0;">0</p>
                </div>
                <div class="stats-card">
                    <h3 style="margin: 0 0 10px 0;">📖 Читаю зараз</h3>
                    <p id="readingBooks" style="font-size: 2rem; margin: 0;">0</p>
                </div>
                <div class="stats-card">
                    <h3 style="margin: 0 0 10px 0;">✅ Прочитано</h3>
                    <p id="finishedBooks" style="font-size: 2rem; margin: 0;">0</p>
                </div>
                <div class="stats-card">
                    <h3 style="margin: 0 0 10px 0;">📄 Всього сторінок</h3>
                    <p id="totalPages" style="font-size: 2rem; margin: 0;">0</p>
                </div>
            </div>

            <div style="background: white; padding: 20px; border-radius: 15px;">
                <h3 style="margin: 0 0 15px 0;">📈 Графік читання</h3>
                <canvas id="statsChart" width="400" height="200"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Firebase конфігурація
        const firebaseConfig = {
            apiKey: "AIzaSyAXgYW2_9ofKCvLoQFT6oMz0bCvbvldPGg",
            authDomain: "chitayko-pwa.firebaseapp.com",
            projectId: "chitayko-pwa",
            storageBucket: "chitayko-pwa.firebasestorage.app",
            messagingSenderId: "278531514478",
            appId: "1:278531514478:web:731dad47437f6aae2b067f"
        };

        // Ініціалізація Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Глобальні змінні
        let currentUser = null;
        let myLibrary = [];
        let currentTab = 'reading';
        let currentBook = null;
        let searchTimeout = null;

        // Ініціалізація застосунку
        document.addEventListener('DOMContentLoaded', () => {
            initializeApp();
        });

        async function initializeApp() {
            // Реєстрація Service Worker
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.register('/sw-simple.js');
                    console.log('Service Worker зареєстровано:', registration);
                } catch (err) {
                    console.log('Помилка реєстрації Service Worker:', err);
                }
            }

            // Слідкування за станом автентифікації
            auth.onAuthStateChanged(user => {
                currentUser = user;
                const loadingScreen = document.getElementById('loadingScreen');
                const authScreen = document.getElementById('authScreen');
                const appScreen = document.getElementById('appScreen');

                if (user) {
                    loadingScreen.classList.add('hidden');
                    authScreen.classList.add('hidden');
                    appScreen.classList.remove('hidden');
                    document.getElementById('userEmail').textContent = user.email;
                    loadLibrary();
                } else {
                    loadingScreen.classList.add('hidden');
                    authScreen.classList.remove('hidden');
                    appScreen.classList.add('hidden');
                }
            });
        }

        // Автентифікація
        function showError(message) {
            const errorDiv = document.getElementById('authError');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => errorDiv.classList.add('hidden'), 5000);
        }

        async function handleAuth(type) {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;

            if (!email || !password) {
                showError('Введіть email та пароль');
                return;
            }

            if (password.length < 6) {
                showError('Пароль має містити мінімум 6 символів');
                return;
            }

            try {
                if (type === 'login') {
                    await auth.signInWithEmailAndPassword(email, password);
                } else {
                    await auth.createUserWithEmailAndPassword(email, password);
                }
            } catch (error) {
                showError('Помилка: ' + error.message);
            }
        }

        async function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
            } catch (error) {
                showError('Помилка входу через Google: ' + error.message);
            }
        }

        function logout() {
            auth.signOut();
        }

        // Управління бібліотекою
        async function loadLibrary() {
            if (!currentUser) return;

            try {
                const snapshot = await db.collection('users').doc(currentUser.uid).collection('books').get();
                myLibrary = [];
                snapshot.forEach(doc => {
                    myLibrary.push({ id: doc.id, ...doc.data() });
                });
                renderBooks();
                updateStats();
            } catch (error) {
                console.error('Помилка завантаження бібліотеки:', error);
            }
        }

        function renderBooks() {
            const booksList = document.getElementById('booksList');
            const filteredBooks = myLibrary.filter(book => book.status === currentTab);
            
            if (filteredBooks.length === 0) {
                booksList.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #64748b;">
                        <div style="font-size: 3rem; margin-bottom: 10px;">📚</div>
                        <p>Тут ще немає книг</p>
                        <button class="btn btn-primary" onclick="openSearchModal()" style="margin-top: 15px;">Додати першу книгу</button>
                    </div>
                `;
                return;
            }

            booksList.innerHTML = filteredBooks.map(book => `
                <div class="book-card fade-in" onclick="showBookDetails('${book.id}')">
                    <div style="display: flex; gap: 15px;">
                        <img src="${book.image || 'https://via.placeholder.com/120x180/f1f5f9/94a3b8?text=No+Cover'}" 
                             style="width: 80px; height: 120px; object-fit: cover; border-radius: 8px;">
                        <div style="flex: 1;">
                            <h3 style="margin: 0 0 5px 0; color: #1f2937;">${book.title}</h3>
                            <p style="margin: 5px 0; color: #64748b;">${book.author}</p>
                            <p style="margin: 5px 0; color: #64748b;">${book.pagesTotal} сторінок</p>
                            
                            ${book.status === 'reading' ? `
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${Math.round((book.pagesRead || 0) / book.pagesTotal * 100)}%;"></div>
                                </div>
                                <p style="margin: 5px 0; color: #4f46e5; font-size: 0.9rem;">
                                    ${Math.round((book.pagesRead || 0) / book.pagesTotal * 100)}% прочитано
                                </p>
                            ` : ''}
                            
                            ${book.status === 'finished' && book.rating ? `
                                <p style="margin: 5px 0; color: #f59e0b;">${'⭐'.repeat(book.rating)}</p>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            currentTab = tab;
            
            // Оновлення активної вкладки
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            renderBooks();
        }

        // Пошук книг
        function openSearchModal() {
            document.getElementById('searchSection').classList.toggle('hidden');
            if (!document.getElementById('searchSection').classList.contains('hidden')) {
                document.getElementById('searchInput').focus();
            }
        }

        function handleSearch(event) {
            clearTimeout(searchTimeout);
            const query = event.target.value.toLowerCase();
            
            searchTimeout = setTimeout(async () => {
                if (query.length < 2) {
                    document.getElementById('searchResults').innerHTML = '';
                    return;
                }

                try {
                    const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=10&key=AIzaSyDkpAZ7A8sYoVmd9hzl0OI5K8eli8blsME`);
                    const data = await response.json();
                    
                    const books = data.items?.map(item => ({
                        googleId: item.id,
                        title: item.volumeInfo.title || 'Без назви',
                        author: item.volumeInfo.authors?.[0] || 'Невідомий автор',
                        pagesTotal: item.volumeInfo.pageCount || 300,
                        image: item.volumeInfo.imageLinks?.thumbnail || 'https://via.placeholder.com/120x180/f1f5f9/94a3b8?text=No+Cover',
                        description: item.volumeInfo.description || 'Опис відсутній'
                    })) || [];

                    document.getElementById('searchResults').innerHTML = books.map(book => `
                        <div class="book-card fade-in" onclick="addBookToLibrary(${JSON.stringify(book).replace(/"/g, '&quot;')})">
                            <div style="display: flex; gap: 15px;">
                                <img src="${book.image}" style="width: 60px; height: 90px; object-fit: cover; border-radius: 8px;">
                                <div style="flex: 1;">
                                    <h4 style="margin: 0 0 5px 0; color: #1f2937;">${book.title}</h4>
                                    <p style="margin: 5px 0; color: #64748b;">${book.author}</p>
                                    <button class="btn btn-primary" style="margin-top: 10px;">➕ Додати</button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } catch (error) {
                    console.error('Помилка пошуку:', error);
                }
            }, 500);
        }

        async function addBookToLibrary(bookData) {
            if (!currentUser) return;

            try {
                const newBook = {
                    ...bookData,
                    status: 'planned',
                    pagesRead: 0,
                    rating: 0,
                    notes: '',
                    dateAdded: new Date().toISOString()
                };

                await db.collection('users').doc(currentUser.uid).collection('books').add(newBook);
                
                // Очистити пошук
                document.getElementById('searchInput').value = '';
                document.getElementById('searchResults').innerHTML = '';
                document.getElementById('searchSection').classList.add('hidden');
                
                await loadLibrary();
            } catch (error) {
                console.error('Помилка додавання книги:', error);
            }
        }

        // Деталі книги
        function showBookDetails(bookId) {
            currentBook = myLibrary.find(book => book.id === bookId);
            if (!currentBook) return;

            document.getElementById('bookTitle').textContent = currentBook.title;
            document.getElementById('bookAuthor').textContent = `Автор: ${currentBook.author}`;
            document.getElementById('bookPages').textContent = `Сторінок: ${currentBook.pagesTotal}`;
            document.getElementById('bookDescription').textContent = currentBook.description || 'Опис відсутній';
            document.getElementById('bookCover').src = currentBook.image || 'https://via.placeholder.com/120x180/f1f5f9/94a3b8?text=No+Cover';
            document.getElementById('bookStatus').value = currentBook.status;
            document.getElementById('bookNotes').value = currentBook.notes || '';
            
            updateRatingDisplay();
            document.getElementById('bookDetailsModal').classList.remove('hidden');
        }

        function closeBookDetails() {
            document.getElementById('bookDetailsModal').classList.add('hidden');
            currentBook = null;
        }

        function updateRatingDisplay() {
            if (!currentBook) return;
            
            const stars = document.querySelectorAll('#ratingStars span');
            stars.forEach((star, index) => {
                star.textContent = index < currentBook.rating ? '⭐' : '☆';
            });
        }

        function setRating(rating) {
            if (!currentBook) return;
            currentBook.rating = rating;
            updateRatingDisplay();
        }

        async function updateBookStatus() {
            if (!currentBook) return;
            
            const newStatus = document.getElementById('bookStatus').value;
            currentBook.status = newStatus;
            
            if (newStatus === 'finished') {
                currentBook.pagesRead = currentBook.pagesTotal;
            }
            
            try {
                await db.collection('users').doc(currentUser.uid).collection('books').doc(currentBook.id).update({
                    status: newStatus,
                    pagesRead: currentBook.pagesRead
                });
                await loadLibrary();
            } catch (error) {
                console.error('Помилка оновлення статусу:', error);
            }
        }

        async function saveBookDetails() {
            if (!currentBook) return;
            
            try {
                await db.collection('users').doc(currentUser.uid).collection('books').doc(currentBook.id).update({
                    rating: currentBook.rating,
                    notes: document.getElementById('bookNotes').value
                });
                
                closeBookDetails();
                await loadLibrary();
            } catch (error) {
                console.error('Помилка збереження деталей:', error);
            }
        }

        async function deleteBook() {
            if (!currentBook) return;
            
            if (!confirm(`Видалити книгу "${currentBook.title}"?`)) return;
            
            try {
                await db.collection('users').doc(currentUser.uid).collection('books').doc(currentBook.id).delete();
                closeBookDetails();
                await loadLibrary();
            } catch (error) {
                console.error('Помилка видалення книги:', error);
            }
        }

        // Статистика
        function openStatsModal() {
            updateStats();
            document.getElementById('statsModal').classList.remove('hidden');
        }

        function closeStatsModal() {
            document.getElementById('statsModal').classList.add('hidden');
        }

        function updateStats() {
            const totalBooks = myLibrary.length;
            const readingBooks = myLibrary.filter(book => book.status === 'reading').length;
            const finishedBooks = myLibrary.filter(book => book.status === 'finished').length;
            const totalPages = myLibrary.reduce((sum, book) => sum + (book.pagesTotal || 0), 0);

            document.getElementById('totalBooks').textContent = totalBooks;
            document.getElementById('readingBooks').textContent = readingBooks;
            document.getElementById('finishedBooks').textContent = finishedBooks;
            document.getElementById('totalPages').textContent = totalPages;

            // Побудова графіка
            buildStatsChart();
        }

        function buildStatsChart() {
            const canvas = document.getElementById('statsChart');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const finishedBooks = myLibrary.filter(book => book.status === 'finished');
            
            // Групування за місяцями
            const monthlyData = {};
            finishedBooks.forEach(book => {
                const month = new Date(book.dateAdded).toLocaleDateString('uk-UA', { month: 'short' });
                monthlyData[month] = (monthlyData[month] || 0) + 1;
            });

            const labels = Object.keys(monthlyData).slice(-6); // Останні 6 місяців
            const data = labels.map(month => monthlyData[month] || 0);

            // Простий графік
            const maxValue = Math.max(...data, 1);
            const chartWidth = canvas.width;
            const chartHeight = canvas.height;
            const barWidth = chartWidth / labels.length * 0.6;
            const spacing = chartWidth / labels.length * 0.4;

            ctx.clearRect(0, 0, chartWidth, chartHeight);
            
            // Мітки осей
            ctx.fillStyle = '#64748b';
            ctx.font = '12px sans-serif';
            labels.forEach((label, index) => {
                const x = index * (barWidth + spacing) + spacing;
                const y = chartHeight - 20;
                ctx.fillText(label, x, y);
            });

            // Стовпці
            data.forEach((value, index) => {
                const x = index * (barWidth + spacing) + spacing;
                const barHeight = (value / maxValue) * (chartHeight - 40);
                const y = chartHeight - barHeight - 20;
                
                ctx.fillStyle = '#4f46e5';
                ctx.fillRect(x, y, barWidth, barHeight);
                
                // Значення
                ctx.fillStyle = '#1f2937';
                ctx.fillText(value, x + barWidth/2 - 5, y - 5);
            });
        }

        // Тема
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }

        // Завантаження теми
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
        }

        console.log('🚀 ЧитайКо повнофункціональна версія завантажена!');
    </script>
</body>
</html>
