<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЧитайКо — Бібліотека</title>
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1e293b;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .title {
            font-size: 2.5rem;
            font-weight: 900;
            color: #4f46e5;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #64748b;
            font-size: 1.1rem;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
        }
        .tab {
            padding: 10px 20px;
            background: #f3f4f6;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .tab.active {
            background: #4f46e5;
            color: white;
        }
        .content-section {
            display: none;
        }
        .content-section.active {
            display: block;
        }
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .book-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .book-cover {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .book-title {
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }
        .book-author {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .book-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-reading { background: #dbeafe; color: #1e40af; }
        .status-planned { background: #fef3c7; color: #92400e; }
        .status-finished { background: #d1fae5; color: #065f46; }
        .progress-bar {
            margin-top: 10px;
            background: #e5e7eb;
            border-radius: 6px;
            overflow: hidden;
            height: 8px;
        }
        .progress-fill {
            height: 100%;
            background: #4f46e5;
            transition: width 0.3s ease;
        }
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #4f46e5;
            color: white;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3);
            transition: all 0.3s ease;
        }
        .fab:hover {
            transform: scale(1.1);
            background: #4338ca;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        body.dark { background: #1f2937; color: #f9fafb; }
        body.dark .book-card { background: #374151; }
        body.dark .modal-content { background: #374151; }
        .search-container {
            margin-bottom: 20px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .search-input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 class="title">📚 ЧитайКо</h1>
            <p class="subtitle">Ваша особиста бібліотека книг</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('library')">📖 Бібліотека</button>
            <button class="tab" onclick="switchTab('reading')">📱 Читалка</button>
            <button class="tab" onclick="switchTab('stats')">📊 Статистика</button>
        </div>

        <!-- Секція бібліотеки -->
        <div id="library-section" class="content-section active">
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Пошук книг..." oninput="searchBooks(this.value)">
                <span class="search-icon">🔍</span>
            </div>
            
            <div class="book-grid" id="bookGrid"></div>
        </div>

        <!-- Секція читалки -->
        <div id="reading-section" class="content-section">
            <div style="text-align: center; padding: 40px;">
                <div style="font-size: 3rem; margin-bottom: 20px;">📱</div>
                <h2>Читалка EPUB</h2>
                <p style="color: #64748b; margin-bottom: 20px;">Завантажте EPUB файл для читання</p>
                <input type="file" id="epubFile" accept=".epub" style="margin-bottom: 20px;">
                <button class="btn" style="background: #4f46e5; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer;" onclick="loadEpub()">📖 Почати читання</button>
            </div>
            <div id="reader" style="display: none;">
                <div style="margin-bottom: 20px;">
                    <button onclick="closeReader()" style="background: #ef4444; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;">✕ Закрити</button>
                    <button onclick="changeFontSize(-10)" style="background: #3b82f6; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px;">A-</button>
                    <button onclick="changeFontSize(10)" style="background: #10b981; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin-left: 5px;">A+</button>
                </div>
                <div id="viewer" style="height: 600px; border: 2px solid #e5e7eb; border-radius: 10px;"></div>
            </div>
        </div>

        <!-- Секція статистики -->
        <div id="stats-section" class="content-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalBooks">0</div>
                    <div class="stat-label">📚 Всього книг</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="readingBooks">0</div>
                    <div class="stat-label">📖 Читаю</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="finishedBooks">0</div>
                    <div class="stat-label">✅ Прочитано</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="plannedBooks">0</div>
                    <div class="stat-label">🕒 Хочу прочитати</div>
                </div>
            </div>
            
            <div style="background: white; padding: 20px; border-radius: 15px;">
                <h3 style="margin: 0 0 15px 0;">📈 Графік читання</h3>
                <canvas id="statsChart" width="400" height="200"></canvas>
            </div>
        </div>
    </div>

    <!-- FAB кнопка -->
    <button class="fab" onclick="openAddBookModal()">➕</button>

    <!-- Модальне вікно додавання книги -->
    <div id="addBookModal" class="modal hidden">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">➕ Додати книгу</h2>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Назва книги</label>
                <input type="text" id="bookTitle" style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Автор</label>
                <input type="text" id="bookAuthor" style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Кількість сторінок</label>
                <input type="number" id="bookPages" style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Статус</label>
                <select id="bookStatus" style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px;">
                    <option value="planned">🕒 Хочу прочитати</option>
                    <option value="reading">📖 Читаю зараз</option>
                    <option value="finished">✅ Прочитано</option>
                </select>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Прогрес (сторінок)</label>
                <input type="number" id="bookProgress" style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px;" placeholder="0">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button onclick="addBook()" style="flex: 1; background: #4f46e5; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer;">✅ Додати</button>
                <button onclick="closeAddBookModal()" style="flex: 1; background: #6b7280; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer;">❌ Скасувати</button>
            </div>
        </div>
    </div>

    <script>
        // Глобальні змінні
        let books = [];
        let currentTab = 'library';
        let rendition = null;
        let fontSize = 100;

        // Ініціалізація
        document.addEventListener('DOMContentLoaded', () => {
            loadBooksFromStorage();
            renderBooks();
            updateStats();
            
            // Service Worker для PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw-simple.js').then(registration => {
                    console.log('Service Worker зареєстровано:', registration);
                }).catch(error => {
                    console.log('Помилка реєстрації Service Worker:', error);
                });
            }
        });

        // Перемикання вкладок
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-section').classList.add('active');
            
            if (tab === 'stats') {
                updateStats();
                buildChart();
            }
        }

        // Робота з Local Storage
        function loadBooksFromStorage() {
            const stored = localStorage.getItem('chitayko-books');
            if (stored) {
                books = JSON.parse(stored);
            } else {
                // Демо книги
                books = [
                    {
                        id: 1,
                        title: "Кобзар",
                        author: "Тарас Шевченко",
                        pages: 200,
                        progress: 50,
                        status: "reading",
                        cover: "https://via.placeholder.com/200x300/4f46e5/ffffff?text=Кобзар"
                    },
                    {
                        id: 2,
                        title: "Тіні забутих предків",
                        author: "Михайло Коцюбинський",
                        pages: 150,
                        progress: 150,
                        status: "finished",
                        cover: "https://via.placeholder.com/200x300/10b981/ffffff?text=Тіні"
                    },
                    {
                        id: 3,
                        title: "Захар Беркут",
                        author: "Іван Франко",
                        pages: 300,
                        progress: 0,
                        status: "planned",
                        cover: "https://via.placeholder.com/200x300/f59e0b/ffffff?text=Захар"
                    }
                ];
                saveBooksToStorage();
            }
        }

        function saveBooksToStorage() {
            localStorage.setItem('chitayko-books', JSON.stringify(books));
        }

        // Відображення книг
        function renderBooks(filteredBooks = null) {
            const bookGrid = document.getElementById('bookGrid');
            const booksToRender = filteredBooks || books;
            
            if (booksToRender.length === 0) {
                bookGrid.innerHTML = `
                    <div style="text-align: center; padding: 40px; grid-column: 1 / -1;">
                        <div style="font-size: 3rem; margin-bottom: 10px;">📚</div>
                        <p>Немає книг</p>
                        <button onclick="openAddBookModal()" style="background: #4f46e5; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px;">➕ Додати першу книгу</button>
                    </div>
                `;
                return;
            }
            
            bookGrid.innerHTML = booksToRender.map(book => `
                <div class="book-card fade-in" onclick="openBookDetails(${book.id})">
                    <img src="${book.cover || `https://via.placeholder.com/200x300/f1f5f9/94a3b8?text=${encodeURIComponent(book.title)}`}" class="book-cover">
                    <div class="book-title">${book.title}</div>
                    <div class="book-author">${book.author}</div>
                    <span class="book-status status-${book.status}">
                        ${book.status === 'reading' ? '📖 Читаю' : book.status === 'finished' ? '✅ Прочитано' : '🕒 Хочу прочитати'}
                    </span>
                    ${book.status === 'reading' && book.progress > 0 ? `
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${Math.round(book.progress / book.pages * 100)}%"></div>
                        </div>
                        <div style="margin-top: 5px; color: #4f46e5; font-size: 0.8rem;">
                            ${Math.round(book.progress / book.pages * 100)}% (${book.progress}/${book.pages} стор.)
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // Пошук книг
        function searchBooks(query) {
            if (!query) {
                renderBooks();
                return;
            }
            
            const filtered = books.filter(book => 
                book.title.toLowerCase().includes(query.toLowerCase()) ||
                book.author.toLowerCase().includes(query.toLowerCase())
            );
            renderBooks(filtered);
        }

        // Модальне вікно додавання книги
        function openAddBookModal() {
            document.getElementById('addBookModal').classList.remove('hidden');
        }

        function closeAddBookModal() {
            document.getElementById('addBookModal').classList.add('hidden');
            // Очистити форму
            document.getElementById('bookTitle').value = '';
            document.getElementById('bookAuthor').value = '';
            document.getElementById('bookPages').value = '';
            document.getElementById('bookStatus').value = 'planned';
            document.getElementById('bookProgress').value = '';
        }

        // Додавання книги
        function addBook() {
            const title = document.getElementById('bookTitle').value.trim();
            const author = document.getElementById('bookAuthor').value.trim();
            const pages = parseInt(document.getElementById('bookPages').value) || 0;
            const status = document.getElementById('bookStatus').value;
            const progress = parseInt(document.getElementById('bookProgress').value) || 0;
            
            if (!title || !author) {
                alert('Введіть назву та автора книги');
                return;
            }
            
            const newBook = {
                id: Date.now(),
                title,
                author,
                pages,
                progress: Math.min(progress, pages),
                status,
                cover: `https://via.placeholder.com/200x300/${getRandomColor()}/ffffff?text=${encodeURIComponent(title)}`
            };
            
            books.push(newBook);
            saveBooksToStorage();
            renderBooks();
            updateStats();
            closeAddBookModal();
        }

        function getRandomColor() {
            const colors = ['4f46e5', '10b981', 'f59e0b', 'ef4444', '8b5cf6', '06b6d4'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // Деталі книги
        function openBookDetails(bookId) {
            const book = books.find(b => b.id === bookId);
            if (!book) return;
            
            const newStatus = prompt(`Змінити статус книги "${book.title}":\n\n1. 🕒 Хочу прочитати\n2. 📖 Читаю зараз\n3. ✅ Прочитано\n\nВведіть номер (1-3):`);
            
            if (newStatus === '1') book.status = 'planned';
            else if (newStatus === '2') book.status = 'reading';
            else if (newStatus === '3') book.status = 'finished';
            else return;
            
            if (book.status === 'finished') {
                book.progress = book.pages;
            }
            
            saveBooksToStorage();
            renderBooks();
            updateStats();
        }

        // Статистика
        function updateStats() {
            const total = books.length;
            const reading = books.filter(b => b.status === 'reading').length;
            const finished = books.filter(b => b.status === 'finished').length;
            const planned = books.filter(b => b.status === 'planned').length;
            
            document.getElementById('totalBooks').textContent = total;
            document.getElementById('readingBooks').textContent = reading;
            document.getElementById('finishedBooks').textContent = finished;
            document.getElementById('plannedBooks').textContent = planned;
        }

        function buildChart() {
            const canvas = document.getElementById('statsChart');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const finishedBooks = books.filter(book => book.status === 'finished');
            
            // Простий графік
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Заголовок
            ctx.fillStyle = '#1f2937';
            ctx.font = '16px sans-serif';
            ctx.fillText('📊 Прочитані книги: ' + finishedBooks.length, 20, 30);
            
            // Кругова діаграма
            const centerX = 200;
            const centerY = 120;
            const radius = 60;
            
            const total = books.length;
            const finished = finishedBooks.length;
            const angle = (finished / total) * 2 * Math.PI;
            
            // Коло
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.fillStyle = '#e5e7eb';
            ctx.fill();
            
            // Прочитані
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, -Math.PI/2, -Math.PI/2 + angle);
            ctx.closePath();
            ctx.fillStyle = '#4f46e5';
            ctx.fill();
            
            // Текст
            ctx.fillStyle = '#1f2937';
            ctx.font = '14px sans-serif';
            ctx.fillText(`${Math.round(finished/total*100)}% прочитано`, centerX - 30, centerY + 5);
        }

        // Читалка EPUB
        function loadEpub() {
            const fileInput = document.getElementById('epubFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Виберіть EPUB файл');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const book = ePub(e.target.result);
                rendition = book.renderTo('viewer');
                
                document.getElementById('reader').style.display = 'block';
                document.querySelector('#reading-section > div:first-child').style.display = 'none';
                
                rendition.display();
            };
            reader.readAsArrayBuffer(file);
        }

        function closeReader() {
            if (rendition) {
                rendition.destroy();
                rendition = null;
            }
            document.getElementById('reader').style.display = 'none';
            document.querySelector('#reading-section > div:first-child').style.display = 'block';
        }

        function changeFontSize(delta) {
            fontSize = Math.max(50, Math.min(200, fontSize + delta));
            if (rendition) {
                rendition.themes.fontSize(fontSize + '%');
            }
        }

        console.log('📚 ЧитайКо - проста версія завантажена!');
    </script>
</body>
</html>
