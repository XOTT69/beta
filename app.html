<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЧитайКо — Додаток</title>
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="description" content="ЧитайКо - ваша хмарна бібліотека">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1e293b;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .title {
            font-size: 2rem;
            font-weight: 900;
            color: #4f46e5;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #64748b;
            font-size: 1rem;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
        }
        .tab {
            padding: 10px 20px;
            background: #f3f4f6;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .tab.active {
            background: #4f46e5;
            color: white;
        }
        .tab:hover {
            background: #e5e7eb;
        }
        .content-section {
            display: none;
        }
        .content-section.active {
            display: block;
        }
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .book-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #e5e7eb;
            transition: all 0.3s ease;
        }
        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .book-cover {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .book-title {
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 5px;
        }
        .book-author {
            color: #64748b;
            font-size: 0.9rem;
        }
        .reading-progress {
            margin-top: 10px;
            background: #e5e7eb;
            border-radius: 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 6px;
            background: #4f46e5;
            transition: width 0.3s ease;
        }
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #4f46e5;
            color: white;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3);
            transition: all 0.3s ease;
        }
        .fab:hover {
            transform: scale(1.1);
            background: #4338ca;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        body.dark { background: #1f2937; color: #f9fafb; }
        body.dark .container { background: #374151; }
        body.dark .book-card { background: #1f2937; border-color: #4b5563; }
        body.dark .modal-content { background: #374151; }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 class="title">📚 ЧитайКо</h1>
            <p class="subtitle">Ваша бібліотека книг</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('library')">📖 Бібліотека</button>
            <button class="tab" onclick="switchTab('reading')">📱 Читалка</button>
            <button class="tab" onclick="switchTab('stats')">📊 Статистика</button>
        </div>

        <!-- Секція бібліотеки -->
        <div id="library-section" class="content-section active">
            <div class="book-grid" id="bookGrid"></div>
        </div>

        <!-- Секція читалки -->
        <div id="reading-section" class="content-section">
            <div style="text-align: center; padding: 40px;">
                <div style="font-size: 3rem; margin-bottom: 20px;">📱</div>
                <h2>Читалка EPUB</h2>
                <p style="color: #64748b; margin-bottom: 20px;">Завантажте EPUB файл для читання</p>
                <input type="file" id="epubFile" accept=".epub" style="margin-bottom: 20px;">
                <button class="btn" style="background: #4f46e5; color: white; padding: 15px 30px;" onclick="loadEpub()">📖 Почати читання</button>
            </div>
            <div id="reader" style="display: none;">
                <div style="margin-bottom: 20px;">
                    <button onclick="closeReader()" style="background: #ef4444; color: white;">✕ Закрити</button>
                    <button onclick="changeFontSize(-10)" style="background: #3b82f6; color: white; margin-left: 10px;">A-</button>
                    <button onclick="changeFontSize(10)" style="background: #10b981; color: white; margin-left: 5px;">A+</button>
                </div>
                <div id="viewer" style="height: 600px; border: 2px solid #e5e7eb; border-radius: 10px;"></div>
            </div>
        </div>

        <!-- Секція статистики -->
        <div id="stats-section" class="content-section">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px; text-align: center;">
                    <div style="font-size: 2rem; margin-bottom: 10px;">📚</div>
                    <div style="font-size: 1.5rem; font-weight: 700;">0</div>
                    <div>Всього книг</div>
                </div>
                <div style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 20px; border-radius: 15px; text-align: center;">
                    <div style="font-size: 2rem; margin-bottom: 10px;">📖</div>
                    <div style="font-size: 1.5rem; font-weight: 700;">0</div>
                    <div>Читаю</div>
                </div>
                <div style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; padding: 20px; border-radius: 15px; text-align: center;">
                    <div style="font-size: 2rem; margin-bottom: 10px;">✅</div>
                    <div style="font-size: 1.5rem; font-weight: 700;">0</div>
                    <div>Прочитано</div>
                </div>
            </div>
        </div>
    </div>

    <!-- FAB кнопка -->
    <button class="fab" onclick="openAddBookModal()">➕</button>

    <!-- Модальне вікно додавання книги -->
    <div id="addBookModal" class="modal hidden">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">➕ Додати книгу</h2>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Назва книги</label>
                <input type="text" id="bookTitle" style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Автор</label>
                <input type="text" id="bookAuthor" style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Кількість сторінок</label>
                <input type="number" id="bookPages" style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">URL обкладинки</label>
                <input type="url" id="bookCover" style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px;">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button onclick="addBook()" style="flex: 1; background: #4f46e5; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer;">✅ Додати</button>
                <button onclick="closeAddBookModal()" style="flex: 1; background: #6b7280; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer;">❌ Скасувати</button>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAXgYW2_9ofKCvLoQFT6oMz0bCvbvldPGg",
            authDomain: "chitayko-pwa.firebaseapp.com",
            projectId: "chitayko-pwa",
            storageBucket: "chitayko-pwa.firebasestorage.app",
            messagingSenderId: "278531514478",
            appId: "1:278531514478:web:731dad47437f6aae2b067f"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentUser = null;
        let books = [];
        let currentBook = null;
        let rendition = null;
        let fontSize = 100;

        // Ініціалізація
        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                if (user) {
                    loadBooks();
                } else {
                    window.location.href = 'index.html';
                }
            });
        });

        // Перемикання вкладок
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-section').classList.add('active');
        }

        // Завантаження книг
        async function loadBooks() {
            if (!currentUser) return;
            
            const snapshot = await db.collection('users').doc(currentUser.uid).collection('books').get();
            books = [];
            snapshot.forEach(doc => {
                books.push({ id: doc.id, ...doc.data() });
            });
            renderBooks();
        }

        // Відображення книг
        function renderBooks() {
            const bookGrid = document.getElementById('bookGrid');
            
            if (books.length === 0) {
                bookGrid.innerHTML = `
                    <div style="text-align: center; padding: 40px; grid-column: 1 / -1;">
                        <div style="font-size: 3rem; margin-bottom: 10px;">📚</div>
                        <p>Немає книг</p>
                        <button onclick="openAddBookModal()" style="background: #4f46e5; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer;">➕ Додати першу книгу</button>
                    </div>
                `;
                return;
            }
            
            bookGrid.innerHTML = books.map(book => `
                <div class="book-card fade-in" onclick="openBook('${book.id}')">
                    <img src="${book.cover || 'https://via.placeholder.com/200x150/f1f5f9/94a3b8?text=Book'}" class="book-cover">
                    <div class="book-title">${book.title}</div>
                    <div class="book-author">${book.author}</div>
                    ${book.progress ? `
                        <div class="reading-progress">
                            <div class="progress-fill" style="width: ${book.progress}%"></div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // Модальне вікно додавання книги
        function openAddBookModal() {
            document.getElementById('addBookModal').classList.remove('hidden');
        }

        function closeAddBookModal() {
            document.getElementById('addBookModal').classList.add('hidden');
        }

        // Додавання книги
        async function addBook() {
            const title = document.getElementById('bookTitle').value;
            const author = document.getElementById('bookAuthor').value;
            const pages = document.getElementById('bookPages').value;
            const cover = document.getElementById('bookCover').value;
            
            if (!title || !author) {
                alert('Введіть назву та автора книги');
                return;
            }
            
            const newBook = {
                title,
                author,
                pages: parseInt(pages) || 0,
                cover: cover || `https://via.placeholder.com/200x150/f1f5f9/94a3b8?text=${encodeURIComponent(title)}`,
                progress: 0,
                status: 'planned',
                dateAdded: new Date().toISOString()
            };
            
            await db.collection('users').doc(currentUser.uid).collection('books').add(newBook);
            
            // Очистити форму
            document.getElementById('bookTitle').value = '';
            document.getElementById('bookAuthor').value = '';
            document.getElementById('bookPages').value = '';
            document.getElementById('bookCover').value = '';
            
            closeAddBookModal();
            loadBooks();
        }

        // Читалка EPUB
        function openBook(bookId) {
            currentBook = books.find(book => book.id === bookId);
            if (!currentBook) return;
            
            switchTab('reading');
        }

        function loadEpub() {
            const fileInput = document.getElementById('epubFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Виберіть EPUB файл');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const book = ePub(e.target.result);
                rendition = book.renderTo('viewer');
                
                document.getElementById('reader').style.display = 'block';
                document.querySelector('#reading-section > div:first-child').style.display = 'none';
                
                rendition.display();
            };
            reader.readAsArrayBuffer(file);
        }

        function closeReader() {
            if (rendition) {
                rendition.destroy();
                rendition = null;
            }
            document.getElementById('reader').style.display = 'none';
            document.querySelector('#reading-section > div:first-child').style.display = 'block';
        }

        function changeFontSize(delta) {
            fontSize = Math.max(50, Math.min(200, fontSize + delta));
            if (rendition) {
                rendition.themes.fontSize(fontSize + '%');
            }
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw-simple.js').then(registration => {
                console.log('Service Worker зареєстровано:', registration);
            }).catch(error => {
                console.log('Помилка реєстрації Service Worker:', error);
            });
        }

        console.log('📚 ЧитайКо App завантажено!');
    </script>
</body>
</html>
